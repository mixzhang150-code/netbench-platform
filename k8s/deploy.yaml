apiVersion: v1
kind: Namespace
metadata:
  name: netbench
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: netbench-config
  namespace: netbench
data:
  NODE_ENV: "production"
  JWT_SECRET: "CHANGE_ME_IN_PRODUCTION"
  PING_SERVICE_URL: "http://ping-service:3001"
  HTTP_SERVICE_URL: "http://http-service:3002"
  SPEEDTEST_SERVICE_URL: "http://speedtest-service:3003"
  NODE_SERVICE_URL: "http://node-service:3004"
  USER_SERVICE_URL: "http://user-service:3005"
  DATA_SERVICE_URL: "http://data-service:3006"
  MONITORING_SERVICE_URL: "http://monitoring-service:3007"
---
apiVersion: v1
kind: Secret
metadata:
  name: netbench-secrets
  namespace: netbench
type: Opaque
stringData:
  DB_PASSWORD: "CHANGE_ME"
  REDIS_PASSWORD: "CHANGE_ME"
  INFLUX_TOKEN: "CHANGE_ME"
  RABBITMQ_PASSWORD: "CHANGE_ME"
  JWT_SECRET: "CHANGE_ME"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: netbench
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: netbench/api-gateway:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: netbench-config
            - secretRef:
                name: netbench-secrets
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: netbench
spec:
  selector:
    app: api-gateway
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ping-service
  namespace: netbench
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ping-service
  template:
    metadata:
      labels:
        app: ping-service
    spec:
      containers:
        - name: ping-service
          image: netbench/ping-service:latest
          ports:
            - containerPort: 3001
          envFrom:
            - configMapRef:
                name: netbench-config
            - secretRef:
                name: netbench-secrets
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: ping-service
  namespace: netbench
spec:
  selector:
    app: ping-service
  ports:
    - port: 3001
      targetPort: 3001
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: http-service
  namespace: netbench
spec:
  replicas: 2
  selector:
    matchLabels:
      app: http-service
  template:
    metadata:
      labels:
        app: http-service
    spec:
      containers:
