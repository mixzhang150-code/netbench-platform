            - containerPort: 3004
          envFrom:
            - configMapRef:
                name: netbench-config
            - secretRef:
                name: netbench-secrets
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
