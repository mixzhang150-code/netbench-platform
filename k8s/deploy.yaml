apiVersion: apps/v1
kind: Deployment
metadata:
  name: monitoring-service
  namespace: netbench
spec:
  replicas: 1
  selector:
    matchLabels:
      app: monitoring-service
  template:
    metadata:
      labels:
        app: monitoring-service
    spec:
      containers:
        - name: monitoring-service
          image: netbench/monitoring-service:latest
          ports:
            - containerPort: 3007
          envFrom:
            - configMapRef:
                name: netbench-config
