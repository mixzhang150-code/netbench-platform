            - secretRef:
                name: netbench-secrets
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: http-service
  namespace: netbench
spec:
  selector:
    app: http-service
  ports:
    - port: 3002
      targetPort: 3002
---
apiVersion: apps/v1
