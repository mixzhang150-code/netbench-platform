      targetPort: 3005
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-service
  namespace: netbench
spec:
  replicas: 1
  selector:
    matchLabels:
      app: data-service
  template:
    metadata:
      labels:
        app: data-service
    spec:
      containers:
        - name: data-service
          image: netbench/data-service:latest
          ports:
            - containerPort: 3006
          envFrom:
            - configMapRef:
                name: netbench-config
            - secretRef:
                name: netbench-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: data-service
  namespace: netbench
spec:
